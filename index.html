<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="観劇2026">
  <link rel="apple-touch-icon" href="kangeki-icon.png">
  <title>観劇スケジュール 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #FFF5F8 0%, #F5F9FF 100%); 
      color: #333; 
      padding: 12px;
      padding-bottom: 30px;
      max-width: 800px;
      margin: 0 auto;
      min-height: 100vh;
    }
    h1 { text-align: center; color: #888; font-size: 1.15rem; font-weight: 500; margin-bottom: 10px; letter-spacing: 0.08em; }
    .filters { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
    .troupe-btn { padding: 4px 11px; border-radius: 14px; font-size: 0.73rem; cursor: pointer; border: 1.5px solid; font-weight: 400; transition: all 0.2s; }
    .troupe-btn.active { font-weight: 500; }
    .region-btn { padding: 3px 9px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; border: 1px solid #e0e0e0; background: #fff; color: #bbb; }
    .region-btn.active { background: #F8F8F8; color: #666; border-color: #ccc; }
    .month-row { display: flex; overflow-x: auto; gap: 4px; margin-bottom: 10px; justify-content: center; padding: 2px 0; }
    .month-btn { padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; border: 1px solid #e8e8e8; background: #fff; color: #aaa; white-space: nowrap; }
    .month-btn.active { border: 1.5px solid #999; background: #F5F5F5; color: #444; font-weight: 500; }
    .calendar { background: #fff; border-radius: 16px; padding: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 12px; }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-bottom: 4px; }
    .weekday { text-align: center; padding: 6px 0; font-weight: 600; font-size: 0.72rem; }
    .weekday.sun { color: #F48FB1; }
    .weekday.sat { color: #64B5F6; }
    .weekday.normal { color: #bbb; }
    .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .day { min-height: 50px; padding: 4px; background: #FCFCFC; border-radius: 8px; cursor: pointer; border: 1.5px solid #f5f5f5; transition: all 0.15s; }
    .day:active { transform: scale(0.96); }
    .day.selected { background: #E3F2FD; border-color: #64B5F6; }
    .day.has-fav { border-color: #FFCC80; background: #FFFBF5; }
    .day.dimmed { opacity: 0.3; }
    .day-num { font-size: 0.82rem; font-weight: 600; margin-bottom: 3px; }
    .day-num.sun { color: #F48FB1; }
    .day-num.sat { color: #64B5F6; }
    .day-num.normal { color: #666; }
    .dots { display: flex; flex-wrap: wrap; gap: 2px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.fav { border: 2px solid #FFCC80; }
    .detail { background: #fff; border-radius: 16px; padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); min-height: 100px; }
    .detail h3 { color: #666; font-size: 0.95rem; font-weight: 600; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 12px; }
    .show-card { margin-bottom: 12px; padding: 12px; border-radius: 10px; border-left: 4px solid; }
    .show-title { font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
    .show-venue { font-size: 0.78rem; color: #888; margin-bottom: 8px; }
    .show-time-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 0.82rem; flex-wrap: wrap; }
    .show-time-row span { color: #666; }
    .show-note { color: #E65100; font-size: 0.72rem; font-weight: 500; }
    .show-cast { color: #558B2F; font-size: 0.72rem; font-weight: 500; }
    .fav-btn { padding: 4px 10px; font-size: 0.72rem; cursor: pointer; border-radius: 6px; border: none; transition: all 0.15s; }
    .fav-btn:active { transform: scale(0.95); }
    .fav-btn.active { background: linear-gradient(135deg, #FFCC80, #FFB74D); color: #E65100; }
    .fav-btn.inactive { background: #f5f5f5; color: #aaa; }
    .memo-input { margin-top: 6px; width: 100%; padding: 6px 8px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 0.72rem; font-family: inherit; }
    .memo-input::placeholder { color: #ccc; }
    .shinko { margin-top: 4px; color: #AD1457; font-size: 0.75rem; }
    .empty { color: #ccc; text-align: center; font-size: 0.85rem; padding-top: 25px; line-height: 1.6; }
    .fav-panel { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .fav-panel-btn { padding: 6px 16px; border-radius: 20px; font-size: 0.82rem; cursor: pointer; border: 1.5px solid #FFCC80; color: #E65100; font-weight: 500; transition: all 0.15s; }
    .fav-panel-btn:active { transform: scale(0.97); }
    .fav-panel-btn.has-fav { background: linear-gradient(135deg, #FFF8E1, #FFF3E0); }
    .fav-panel-btn.no-fav { background: #fff; }
    .fav-filter-btn { padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; cursor: pointer; border: 1.5px solid #CE93D8; color: #7B1FA2; font-weight: 500; transition: all 0.15s; background: #fff; }
    .fav-filter-btn:active { transform: scale(0.97); }
    .fav-filter-btn.active { background: linear-gradient(135deg, #F3E5F5, #EDE7F6); border-color: #BA68C8; }
    .fav-list { background: #fff; border: 1.5px solid #FFCC80; border-radius: 14px; padding: 12px; margin-bottom: 12px; max-height: 280px; overflow-y: auto; display: none; box-shadow: 0 2px 12px rgba(255,180,100,0.15); }
    .fav-list.show { display: block; }
    .fav-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
    .fav-list-title { font-weight: 600; color: #E65100; font-size: 0.85rem; }
    .fav-list-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .clear-btn { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; border: 1px solid #EF9A9A; background: #FFEBEE; color: #C62828; }
    .copy-btn { padding: 4px 12px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; border: 1px solid #90CAF9; background: #E3F2FD; color: #1565C0; }
    .fav-list pre { font-size: 0.68rem; white-space: pre-wrap; color: #555; margin: 0; line-height: 1.5; font-family: inherit; background: #FAFAFA; padding: 10px; border-radius: 8px; }
    .fav-list p { color: #aaa; font-size: 0.8rem; margin: 10px 0; text-align: center; }
    .footer { margin-top: 16px; text-align: center; font-size: 0.62rem; color: #ccc; }
  </style>
</head>
<body>
  <h1>🎭 観劇スケジュール 2026</h1>
  
  <div class="fav-panel">
    <button class="fav-panel-btn no-fav" id="favPanelBtn">♡ お気に入り (<span id="favCount">0</span>)</button>
    <button class="fav-filter-btn" id="favFilterBtn">🔍 お気に入りのみ</button>
  </div>
  
  <div class="fav-list" id="favList">
    <div class="fav-list-header">
      <span class="fav-list-title">お気に入り一覧</span>
      <div class="fav-list-btns">
        <button class="clear-btn" id="clearBtn">クリア</button>
        <button class="copy-btn" id="copyBtn">📋 コピー</button>
      </div>
    </div>
    <div id="favContent"></div>
  </div>
  
  <div class="filters">
    <div class="filter-row" id="troupeFilters"></div>
    <div class="filter-row" id="regionFilters"></div>
  </div>
  
  <div class="month-row" id="monthRow"></div>
  
  <div class="calendar">
    <div class="weekdays" id="weekdays"></div>
    <div class="days" id="days"></div>
  </div>
  
  <div class="detail" id="detail">
    <p class="empty">日付をタップすると<br>公演詳細が表示されます</p>
  </div>
  
  <div class="footer">最終更新: 2026-03-23</div>

<script>
let performances = [];

const troupeColors = {
  '花組': { bg: '#FFF5F8', border: '#F8BBD9', dot: '#F48FB1', text: '#AD1457' },
  '月組': { bg: '#FFFDE7', border: '#FFE082', dot: '#FFD54F', text: '#F57F17' },
  '雪組': { bg: '#F1F8E9', border: '#C5E1A5', dot: '#AED581', text: '#558B2F' },
  '星組': { bg: '#E3F2FD', border: '#90CAF9', dot: '#64B5F6', text: '#1565C0' },
  '宙組': { bg: '#F3E5F5', border: '#CE93D8', dot: '#BA68C8', text: '#7B1FA2' },
  '一般': { bg: '#FFF3E0', border: '#FFCC80', dot: '#FFB74D', text: '#E65100' },
};

const troupes = ['花組', '月組', '雪組', '星組', '宙組', '一般'];
const regions = ['関東', '関西', '中部', '九州', '全国'];
const months = ['2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12','2027-01','2027-02'];
const monthNames = {'2026-04':'4月','2026-05':'5月','2026-06':'6月','2026-07':'7月','2026-08':'8月','2026-09':'9月','2026-10':'10月','2026-11':'11月','2026-12':'12月','2027-01':'1月','2027-02':'2月'};
const weekDays = ['日','月','火','水','木','金','土'];

let selectedMonth = '2026-04';
let selectedDate = null;
let selectedTroupes = [...troupes];
let selectedRegions = [...regions, '両方'];
let favorites = {};
let showFavList = false;
let filterFavOnly = false;

try {
  const saved = localStorage.getItem('kangeki-favorites-v3');
  if (saved) favorites = JSON.parse(saved);
} catch(e) {}

function saveFavorites() {
  try { localStorage.setItem('kangeki-favorites-v3', JSON.stringify(favorites)); } catch(e) {}
}

function makeKey(perfId, date, time) {
  const timeKey = time || '_notime_';
  return `${perfId}|${date}|${timeKey}`;
}

function toggleFavorite(perfId, date, time, perfTitle, venue, cast) {
  const key = makeKey(perfId, date, time);
  if (favorites[key]) {
    delete favorites[key];
  } else {
    favorites[key] = { 
      perfId, 
      date, 
      time: time || '', 
      perfTitle, 
      venue, 
      cast: cast || '', 
      memo: '' 
    };
  }
  saveFavorites();
  render();
}

function updateMemo(key, memo) {
  if (favorites[key]) {
    favorites[key].memo = memo;
    saveFavorites();
  }
}

function isFavorite(perfId, date, time) {
  return !!favorites[makeKey(perfId, date, time)];
}

function getFavorite(perfId, date, time) {
  return favorites[makeKey(perfId, date, time)];
}

function getShowsForDate(dateStr, favOnlyOverride = null) {
  if (!dateStr) return [];
  const useFavOnly = favOnlyOverride !== null ? favOnlyOverride : filterFavOnly;
  const shows = [];
  performances.forEach(perf => {
    const troupe = perf.troupe || '一般';
    if (!selectedTroupes.includes(troupe)) return;
    if (!selectedRegions.includes(perf.region)) return;
    if (dateStr < perf.startDate || dateStr > perf.endDate) return;
    const daySchedule = perf.schedule?.find(s => s.date === dateStr);
    if (daySchedule?.note === '休演日') return;
    if (daySchedule && daySchedule.shows && daySchedule.shows.length > 0) {
      // 筛选模式：只显示有收藏的公演
      if (useFavOnly) {
        const hasFavShow = daySchedule.shows.some(s => isFavorite(perf.id, dateStr, s.time));
        if (!hasFavShow) return;
      }
      shows.push({ ...perf, daySchedule, troupe });
    }
  });
  return shows;
}

function hasFavoriteOnDate(dateStr) {
  // 检查该日期是否有任何收藏（忽略筛选）
  const shows = getShowsForDate(dateStr, false);
  return shows.some(show => show.daySchedule?.shows?.some(s => isFavorite(show.id, dateStr, s.time)));
}

function getCalendarData() {
  const [year, month] = selectedMonth.split('-').map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const startDayOfWeek = firstDay.getDay();
  const days = [];
  for (let i = 0; i < startDayOfWeek; i++) days.push({ day: null, date: null });
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    days.push({ day: d, date: dateStr });
  }
  return days;
}

function exportFavorites() {
  const entries = Object.entries(favorites);
  if (entries.length === 0) return 'お気に入りはまだありません';
  const sorted = entries.filter(([_,v]) => v && v.date).sort(([_a,a],[_b,b]) => {
    const dc = (a.date||'').localeCompare(b.date||'');
    if (dc !== 0) return dc;
    return (a.time||'').localeCompare(b.time||'');
  });
  
  let text = `以下の観劇予定をGoogle Calendarに追加してください。
・公演名をタイトル、会場を場所に設定
・時間が記載されている場合は開始時間として、終了時間は3時間後に設定
・「時間未定」の場合は終日イベントとして追加
・メモがある場合は説明欄に記載

---

`;
  sorted.forEach(([_,item], i) => {
    const timeStr = item.time || '時間未定';
    text += `${i+1}. ${item.perfTitle}\n`;
    text += `   日時: ${item.date} ${timeStr}\n`;
    text += `   会場: ${item.venue}\n`;
    if (item.cast) text += `   キャスト: ${item.cast}\n`;
    if (item.memo) text += `   メモ: ${item.memo}\n`;
    text += '\n';
  });
  return text;
}

function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function render() {
  const favCount = Object.keys(favorites).length;
  document.getElementById('favCount').textContent = favCount;
  document.getElementById('favPanelBtn').className = favCount > 0 ? 'fav-panel-btn has-fav' : 'fav-panel-btn no-fav';
  document.getElementById('favFilterBtn').className = filterFavOnly ? 'fav-filter-btn active' : 'fav-filter-btn';
  
  document.getElementById('favList').className = showFavList ? 'fav-list show' : 'fav-list';
  document.getElementById('favContent').innerHTML = favCount === 0 
    ? '<p>公演の♡をタップして追加</p>' 
    : `<pre>${escapeHtml(exportFavorites())}</pre>`;
  
  document.getElementById('troupeFilters').innerHTML = troupes.map(t => {
    const active = selectedTroupes.includes(t);
    const c = troupeColors[t];
    return `<button class="troupe-btn ${active?'active':''}" 
      style="border-color:${c.border};background:${active?c.bg:'#fff'};color:${active?c.text:'#bbb'}"
      onclick="toggleTroupe('${t}')">${t}</button>`;
  }).join('');
  
  document.getElementById('regionFilters').innerHTML = regions.map(r => {
    const active = selectedRegions.includes(r);
    return `<button class="region-btn ${active?'active':''}" onclick="toggleRegion('${r}')">${r}</button>`;
  }).join('');
  
  document.getElementById('monthRow').innerHTML = months.map(m => {
    const active = selectedMonth === m;
    return `<button class="month-btn ${active?'active':''}" onclick="selectMonth('${m}')">${monthNames[m]}</button>`;
  }).join('');
  
  document.getElementById('weekdays').innerHTML = weekDays.map((d,i) => {
    const cls = i === 0 ? 'sun' : i === 6 ? 'sat' : 'normal';
    return `<div class="weekday ${cls}">${d}</div>`;
  }).join('');
  
  const calData = getCalendarData();
  document.getElementById('days').innerHTML = calData.map(cell => {
    if (!cell.day) return '<div class="day" style="background:transparent;border-color:transparent;"></div>';
    
    const allShows = getShowsForDate(cell.date, false); // 获取所有公演
    const hasFav = hasFavoriteOnDate(cell.date);
    const isSelected = cell.date === selectedDate;
    const dow = new Date(cell.date).getDay();
    const numCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : 'normal';
    
    // 筛选模式下，没有收藏的日期变暗
    const isDimmed = filterFavOnly && !hasFav;
    
    let cls = 'day';
    if (isSelected) cls += ' selected';
    else if (hasFav) cls += ' has-fav';
    if (isDimmed) cls += ' dimmed';
    
    // 显示dots时，筛选模式下只显示有收藏的公演的dot
    const showsForDots = filterFavOnly ? getShowsForDate(cell.date, true) : allShows;
    const dots = showsForDots.map(show => {
      const hasAnyFav = show.daySchedule?.shows?.some(s => isFavorite(show.id, cell.date, s.time));
      const c = troupeColors[show.troupe] || {dot:'#ccc'};
      return `<div class="dot ${hasAnyFav?'fav':''}" style="background:${c.dot}" title="${escapeHtml(show.title)}"></div>`;
    }).join('');
    
    return `<div class="${cls}" onclick="selectDate('${cell.date}')">
      <div class="day-num ${numCls}">${cell.day}</div>
      <div class="dots">${dots}</div>
    </div>`;
  }).join('');
  
  if (!selectedDate) {
    const msg = filterFavOnly 
      ? 'お気に入りのみ表示中<br>日付をタップして詳細を確認' 
      : '日付をタップすると<br>公演詳細が表示されます';
    document.getElementById('detail').innerHTML = `<p class="empty">${msg}</p>`;
  } else {
    const shows = getShowsForDate(selectedDate);
    const dateObj = new Date(selectedDate);
    const dateStr = dateObj.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
    
    if (shows.length === 0) {
      const msg = filterFavOnly 
        ? 'この日はお気に入りの公演がありません' 
        : 'この日は公演がありません';
      document.getElementById('detail').innerHTML = `<h3>${dateStr}</h3><p class="empty">${msg}</p>`;
    } else {
      const cards = shows.map(show => {
        const c = troupeColors[show.troupe] || {bg:'#fafafa',border:'#ddd',text:'#555'};
        
        // 筛选模式下，只显示收藏的时间段
        let showTimes = show.daySchedule?.shows || [];
        if (filterFavOnly) {
          showTimes = showTimes.filter(s => isFavorite(show.id, selectedDate, s.time));
        }
        
        const times = showTimes.map((s, idx) => {
          const fav = isFavorite(show.id, selectedDate, s.time);
          const favData = getFavorite(show.id, selectedDate, s.time);
          const key = makeKey(show.id, selectedDate, s.time);
          const timeDisplay = s.time || '時間未定';
          
          let memoSection = '';
          if (fav) {
            const memoVal = escapeHtml(favData?.memo || '');
            memoSection = `<input type="text" class="memo-input" 
              placeholder="メモ（例：FC先行、コンビニ発券、13:30開演）" 
              value="${memoVal}" 
              onchange="updateMemo('${escapeHtml(key)}', this.value)" 
              onclick="event.stopPropagation()">`;
          }
          
          const titleEsc = escapeHtml(show.title);
          const venueEsc = escapeHtml(show.daySchedule?.venue || show.venue);
          const castEsc = escapeHtml(s.cast || '');
          
          return `<div class="show-time-row">
            <span>🎭 ${timeDisplay}</span>
            ${s.note ? `<span class="show-note">${escapeHtml(s.note)}</span>` : ''}
            ${s.cast ? `<span class="show-cast">${castEsc}</span>` : ''}
            <button class="fav-btn ${fav?'active':'inactive'}" onclick="toggleFavorite('${show.id}','${selectedDate}','${s.time || ''}','${titleEsc}','${venueEsc}','${castEsc}')">
              ${fav ? '♡' : '♡'}
            </button>
          </div>${memoSection}`;
        }).join('') || '';
        
        const shinko = show.shinkoDate === selectedDate ? '<div class="shinko">⭐ 新人公演</div>' : '';
        
        return `<div class="show-card" style="background:${c.bg};border-color:${c.border}">
          <div class="show-title" style="color:${c.text}">${show.troupe ? `【${show.troupe}】` : ''}${escapeHtml(show.title)}</div>
          <div class="show-venue">📍 ${escapeHtml(show.daySchedule?.venue || show.venue)}</div>
          ${times}
          ${shinko}
        </div>`;
      }).join('');
      
      document.getElementById('detail').innerHTML = `<h3>${dateStr}</h3>${cards}`;
    }
  }
}

function toggleTroupe(t) {
  if (selectedTroupes.includes(t)) {
    selectedTroupes = selectedTroupes.filter(x => x !== t);
  } else {
    selectedTroupes.push(t);
  }
  render();
}

function toggleRegion(r) {
  if (selectedRegions.includes(r)) {
    selectedRegions = selectedRegions.filter(x => x !== r);
  } else {
    selectedRegions.push(r);
  }
  render();
}

function selectMonth(m) {
  selectedMonth = m;
  selectedDate = null;
  render();
}

function selectDate(d) {
  selectedDate = d;
  render();
}

document.getElementById('favPanelBtn').onclick = () => {
  showFavList = !showFavList;
  render();
};

document.getElementById('favFilterBtn').onclick = () => {
  filterFavOnly = !filterFavOnly;
  render();
};

document.getElementById('clearBtn').onclick = () => {
  if (confirm('お気に入りを全てクリアしますか？')) {
    favorites = {};
    saveFavorites();
    render();
  }
};

document.getElementById('copyBtn').onclick = () => {
  const text = exportFavorites();
  
  // 尝试现代API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      alert('コピーしました！\nClaudeに貼り付けてCalendar追加をお願いしてください');
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
};

function fallbackCopy(text) {
  // 旧方法：创建临时textarea
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  textarea.style.top = '0';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  
  try {
    const success = document.execCommand('copy');
    if (success) {
      alert('コピーしました！\nClaudeに貼り付けてCalendar追加をお願いしてください');
    } else {
      alert('コピー失敗...\n手動でテキストを選択してコピーしてください');
    }
  } catch (err) {
    alert('コピー失敗...\n手動でテキストを選択してコピーしてください');
  }
  
  document.body.removeChild(textarea);
}

fetch('shows.json')
  .then(r => r.json())
  .then(data => { performances = data; render(); })
  .catch(e => { console.error('Failed to load shows.json:', e); render(); });
</script>
</body>
</html>
