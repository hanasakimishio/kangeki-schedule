const troupeColors = {
  '花組': { bg: '#FFF5F8', border: '#F8BBD9', dot: '#F48FB1', text: '#AD1457' },
  '月組': { bg: '#FFFDE7', border: '#FFE082', dot: '#FFD54F', text: '#F57F17' },
  '雪組': { bg: '#F1F8E9', border: '#C5E1A5', dot: '#AED581', text: '#558B2F' },
  '星組': { bg: '#E3F2FD', border: '#90CAF9', dot: '#64B5F6', text: '#1565C0' },
  '宙組': { bg: '#F3E5F5', border: '#CE93D8', dot: '#BA68C8', text: '#7B1FA2' },
  '一般': { bg: '#FFF3E0', border: '#FFCC80', dot: '#FFB74D', text: '#E65100' },
};

const troupes = ['花組', '月組', '雪組', '星組', '宙組', '一般'];
const regions = ['関東', '関西', '中部', '九州', '全国'];
const months = ['2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12','2027-01','2027-02'];
const monthNames = {'2026-04':'4月','2026-05':'5月','2026-06':'6月','2026-07':'7月','2026-08':'8月','2026-09':'9月','2026-10':'10月','2026-11':'11月','2026-12':'12月','2027-01':'1月','2027-02':'2月'};
const weekDays = ['日','月','火','水','木','金','土'];

let selectedMonth = '2026-04';
let selectedDate = null;
let selectedTroupes = [...troupes];
let selectedRegions = [...regions, '両方'];
let favorites = {};
let showFavList = false;

try {
  const saved = localStorage.getItem('kangeki-favorites-v3');
  if (saved) favorites = JSON.parse(saved);
} catch(e) {}

function saveFavorites() {
  try { localStorage.setItem('kangeki-favorites-v3', JSON.stringify(favorites)); } catch(e) {}
}

// 用于生成唯一key的函数，处理空时间
function makeKey(perfId, date, time) {
  const timeKey = time || '_notime_';
  return `${perfId}|${date}|${timeKey}`;
}

function toggleFavorite(perfId, date, time, perfTitle, venue, cast) {
  const key = makeKey(perfId, date, time);
  if (favorites[key]) {
    delete favorites[key];
  } else {
    favorites[key] = { 
      perfId, 
      date, 
      time: time || '', 
      perfTitle, 
      venue, 
      cast: cast || '', 
      memo: '' 
    };
  }
  saveFavorites();
  render();
}

function updateMemo(key, memo) {
  if (favorites[key]) {
    favorites[key].memo = memo;
    saveFavorites();
  }
}

function isFavorite(perfId, date, time) {
  return !!favorites[makeKey(perfId, date, time)];
}

function getFavorite(perfId, date, time) {
  return favorites[makeKey(perfId, date, time)];
}

function getShowsForDate(dateStr) {
  if (!dateStr) return [];
  const shows = [];
  performances.forEach(perf => {
    const troupe = perf.troupe || '一般';
    if (!selectedTroupes.includes(troupe)) return;
    if (!selectedRegions.includes(perf.region)) return;
    if (dateStr < perf.startDate || dateStr > perf.endDate) return;
    const daySchedule = perf.schedule?.find(s => s.date === dateStr);
    if (daySchedule?.note === '休演日') return;
    if (daySchedule && daySchedule.shows && daySchedule.shows.length > 0) {
      shows.push({ ...perf, daySchedule, troupe });
    }
  });
  return shows;
}

function hasFavoriteOnDate(dateStr) {
  const shows = getShowsForDate(dateStr);
  return shows.some(show => show.daySchedule?.shows?.some(s => isFavorite(show.id, dateStr, s.time)));
}

function getCalendarData() {
  const [year, month] = selectedMonth.split('-').map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const startDayOfWeek = firstDay.getDay();
  const days = [];
  for (let i = 0; i < startDayOfWeek; i++) days.push({ day: null, date: null });
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    days.push({ day: d, date: dateStr });
  }
  return days;
}

function exportFavorites() {
  const entries = Object.entries(favorites);
  if (entries.length === 0) return 'お気に入りはまだありません';
  const sorted = entries.filter(([_,v]) => v && v.date).sort(([_a,a],[_b,b]) => {
    const dc = (a.date||'').localeCompare(b.date||'');
    if (dc !== 0) return dc;
    return (a.time||'').localeCompare(b.time||'');
  });
  
  let text = `以下の観劇予定をGoogle Calendarに追加してください。
・公演名をタイトル、会場を場所に設定
・時間が記載されている場合は開始時間として、終了時間は3時間後に設定
・「時間未定」の場合は終日イベントとして追加
・メモがある場合は説明欄に記載

---

`;
  sorted.forEach(([_,item], i) => {
    const timeStr = item.time || '時間未定';
    text += `${i+1}. ${item.perfTitle}\n`;
    text += `   日時: ${item.date} ${timeStr}\n`;
    text += `   会場: ${item.venue}\n`;
    if (item.cast) text += `   キャスト: ${item.cast}\n`;
    if (item.memo) text += `   メモ: ${item.memo}\n`;
    text += '\n';
  });
  return text;
}

function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function render() {
  const favCount = Object.keys(favorites).length;
  document.getElementById('favCount').textContent = favCount;
  document.getElementById('favPanelBtn').className = favCount > 0 ? 'fav-panel-btn has-fav' : 'fav-panel-btn no-fav';
  
  document.getElementById('favList').className = showFavList ? 'fav-list show' : 'fav-list';
  document.getElementById('favContent').innerHTML = favCount === 0 
    ? '<p>公演の♡をタップして追加</p>' 
    : `<pre>${escapeHtml(exportFavorites())}</pre>`;
  
  document.getElementById('troupeFilters').innerHTML = troupes.map(t => {
    const active = selectedTroupes.includes(t);
    const c = troupeColors[t];
    return `<button class="troupe-btn ${active?'active':''}" 
      style="border-color:${c.border};background:${active?c.bg:'#fff'};color:${active?c.text:'#bbb'}"
      onclick="toggleTroupe('${t}')">${t}</button>`;
  }).join('');
  
  document.getElementById('regionFilters').innerHTML = regions.map(r => {
    const active = selectedRegions.includes(r);
    return `<button class="region-btn ${active?'active':''}" onclick="toggleRegion('${r}')">${r}</button>`;
  }).join('');
  
  document.getElementById('monthRow').innerHTML = months.map(m => {
    const active = selectedMonth === m;
    return `<button class="month-btn ${active?'active':''}" onclick="selectMonth('${m}')">${monthNames[m]}</button>`;
  }).join('');
  
  document.getElementById('weekdays').innerHTML = weekDays.map((d,i) => {
    const cls = i === 0 ? 'sun' : i === 6 ? 'sat' : 'normal';
    return `<div class="weekday ${cls}">${d}</div>`;
  }).join('');
  
  const calData = getCalendarData();
  document.getElementById('days').innerHTML = calData.map(cell => {
    if (!cell.day) return '<div class="day" style="background:transparent;border-color:transparent;"></div>';
    const shows = getShowsForDate(cell.date);
    const isSelected = cell.date === selectedDate;
    const hasFav = hasFavoriteOnDate(cell.date);
    const dow = new Date(cell.date).getDay();
    const numCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : 'normal';
    let cls = 'day';
    if (isSelected) cls += ' selected';
    else if (hasFav) cls += ' has-fav';
    
    const dots = shows.map(show => {
      const hasAnyFav = show.daySchedule?.shows?.some(s => isFavorite(show.id, cell.date, s.time));
      const c = troupeColors[show.troupe] || {dot:'#ccc'};
      return `<div class="dot ${hasAnyFav?'fav':''}" style="background:${c.dot}" title="${escapeHtml(show.title)}"></div>`;
    }).join('');
    
    return `<div class="${cls}" onclick="selectDate('${cell.date}')">
      <div class="day-num ${numCls}">${cell.day}</div>
      <div class="dots">${dots}</div>
    </div>`;
  }).join('');
  
  if (!selectedDate) {
    document.getElementById('detail').innerHTML = '<p class="empty">日付をタップすると<br>公演詳細が表示されます</p>';
  } else {
    const shows = getShowsForDate(selectedDate);
    const dateObj = new Date(selectedDate);
    const dateStr = dateObj.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
    
    if (shows.length === 0) {
      document.getElementById('detail').innerHTML = `<h3>${dateStr}</h3><p class="empty">この日は公演がありません</p>`;
    } else {
      const cards = shows.map(show => {
        const c = troupeColors[show.troupe] || {bg:'#fafafa',border:'#ddd',text:'#555'};
        const times = show.daySchedule?.shows?.map((s, idx) => {
          const fav = isFavorite(show.id, selectedDate, s.time);
          const favData = getFavorite(show.id, selectedDate, s.time);
          const key = makeKey(show.id, selectedDate, s.time);
          const timeDisplay = s.time || '時間未定';
          
          // 用idx作为备用标识，确保唯一性
          const safeTime = s.time || `_idx${idx}`;
          
          let memoSection = '';
          if (fav) {
            const memoVal = escapeHtml(favData?.memo || '');
            memoSection = `<input type="text" class="memo-input" 
              placeholder="メモ（例：FC先行、コンビニ発券、13:30開演）" 
              value="${memoVal}" 
              onchange="updateMemo('${escapeHtml(key)}', this.value)" 
              onclick="event.stopPropagation()">`;
          }
          
          const titleEsc = escapeHtml(show.title);
          const venueEsc = escapeHtml(show.daySchedule?.venue || show.venue);
          const castEsc = escapeHtml(s.cast || '');
          
          return `<div class="show-time-row">
            <span>🎭 ${timeDisplay}</span>
            ${s.note ? `<span class="show-note">${escapeHtml(s.note)}</span>` : ''}
            ${s.cast ? `<span class="show-cast">${castEsc}</span>` : ''}
            <button class="fav-btn ${fav?'active':'inactive'}" onclick="toggleFavorite('${show.id}','${selectedDate}','${s.time || ''}','${titleEsc}','${venueEsc}','${castEsc}')">
              ${fav ? '♡' : '♡'}
            </button>
          </div>${memoSection}`;
        }).join('') || '';
        
        const shinko = show.shinkoDate === selectedDate ? '<div class="shinko">⭐ 新人公演</div>' : '';
        
        return `<div class="show-card" style="background:${c.bg};border-color:${c.border}">
          <div class="show-title" style="color:${c.text}">${show.troupe ? `【${show.troupe}】` : ''}${escapeHtml(show.title)}</div>
          <div class="show-venue">📍 ${escapeHtml(show.daySchedule?.venue || show.venue)}</div>
          ${times}
          ${shinko}
        </div>`;
      }).join('');
      
      document.getElementById('detail').innerHTML = `<h3>${dateStr}</h3>${cards}`;
    }
  }
}

function toggleTroupe(t) {
  if (selectedTroupes.includes(t)) {
    selectedTroupes = selectedTroupes.filter(x => x !== t);
  } else {
    selectedTroupes.push(t);
  }
  render();
}

function toggleRegion(r) {
  if (selectedRegions.includes(r)) {
    selectedRegions = selectedRegions.filter(x => x !== r);
  } else {
    selectedRegions.push(r);
  }
  render();
}

function selectMonth(m) {
  selectedMonth = m;
  selectedDate = null;
  render();
}

function selectDate(d) {
  selectedDate = d;
  render();
}

document.getElementById('favPanelBtn').onclick = () => {
  showFavList = !showFavList;
  render();
};

document.getElementById('clearBtn').onclick = () => {
  if (confirm('お気に入りを全てクリアしますか？')) {
    favorites = {};
    saveFavorites();
    render();
  }
};

document.getElementById('copyBtn').onclick = () => {
  navigator.clipboard.writeText(exportFavorites()).then(() => {
    alert('コピーしました！\nClaudeに貼り付けてCalendar追加をお願いしてください');
  }).catch(() => {
    alert('コピー失敗...');
  });
};

render();
</script>
